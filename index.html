<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Quicksand", sans-serif;
    background: linear-gradient(to bottom right, #ffe6f2, #f8e8ff);
    text-align: center;
    padding: 40px;
}

.container {
    background: white;
    border-radius: 25px;
    padding: 30px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0px 8px 25px rgba(255, 150, 200, 0.2);
}

h1 {
    color: #ff7fbf;
}

select {
    padding: 10px;
    margin: 10px;
    border-radius: 12px;
    border: 2px solid #ffd6eb;
    font-size: 16px;
}

button {
    background: #ffb3d9;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff99cc;
}

#img {
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0px 6px 18px rgba(255,150,200,0.3);
}

.items-grid {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 15px;
}

.items-grid img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0px 4px 12px rgba(255,150,200,0.25);
    transition: transform 0.2s;
}

.items-grid img:hover {
    transform: scale(1.08);
}

.status {
    color: #ff7fbf;
    margin-top: 10px;
    font-size: 18px;
    font-weight: 600;
}

.instructions {
    color: #ff7fbf;
    margin-top: 5px;
    font-size: 16px;
    font-weight: 500;
}
</style>

</head>

<body>

<div class="container">

<h1>🎀 Outfit Generator</h1>

<p id="instructions" class="instructions">Choose your gender and your preferred style 👗👔</p>

<select id="gender" onchange="updateStyles()">
  <option value="woman">Woman</option>
  <option value="man">Man</option>
</select>

<select id="style"></select>

<br><br>

<button onclick="go()">Generate Outfit ✨</button>

<p id="status" class="status"></p>
<p id="weatherInfo" class="status"></p>


<img id="img" width="300">
<p id="itemsTitle" class="instructions"></p>

<div id="items" class="items-grid"></div>
<p id="outfitInstructions" class="instructions"></p>

</div>

<script>
const styles = {
    woman: ["y2k", "acubi", "classic"],
    man: ["grunge", "old money", "korean streetwear"]
};

function updateStyles() {
    const gender = document.getElementById("gender").value;
    const styleSelect = document.getElementById("style");
    styleSelect.innerHTML = "";
    styles[gender].forEach(style => {
        const option = document.createElement("option");
        option.value = style;
        option.textContent = style
            .split(" ")
            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
            .join(" ");
        styleSelect.appendChild(option);
    });
}

function go() {
    const status = document.getElementById("status");
    const weatherInfo = document.getElementById("weatherInfo");
    const outfitInstructions = document.getElementById("outfitInstructions");
    const itemsTitle = document.getElementById("itemsTitle");

    outfitInstructions.innerText = "";
    itemsTitle.innerText = "";
    status.innerText = "Getting location... 📍";
    weatherInfo.innerText = "";

    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        status.innerText = "Location: loading city...";

        fetch("http://127.0.0.1:5000/weather", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ lat, lon })
        })
        .then(r => r.json())
        .then(weather => {
            weatherInfo.innerText =
                "Location: " + weather.city +
                "\nWeather: " + weather.temperature + "°C, " + weather.weather;

            status.innerText = "Generating outfit... ✨";

            return fetch("http://127.0.0.1:5000/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    gender: document.getElementById("gender").value,
                    style: document.getElementById("style").value,
                    lat,
                    lon
                })
            });
        })
        .then(r => r.json())
        .then(data => {
            status.innerText = "Here is your outfit 💖";

            itemsTitle.innerText = "Here are all the clothes for the outfit 👇";

            document.getElementById("img").src =
                data.image + "?t=" + new Date().getTime();

            const itemsDiv = document.getElementById("items");
            itemsDiv.innerHTML = "";

            data.items.forEach(item => {
                const img = document.createElement("img");
                img.src =
                    "http://127.0.0.1:5000/image/" +
                    item.path +
                    "?t=" + new Date().getTime();

                img.onclick = () => {
                    fetch(
                        "http://127.0.0.1:5000/get-link/" +
                        item.path +
                        "?t=" + new Date().getTime(),
                        { cache: "no-store" }
                    )
                    .then(r => r.json())
                    .then(data => {
                        window.open(data.link, "_blank");
                    });
                };

                itemsDiv.appendChild(img);
            });
            outfitInstructions.innerText = "Click on any picture to see the website 🛍️";
        });
    });
    
}

updateStyles();
</script>

</body>
</html>
